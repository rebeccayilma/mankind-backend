services:
  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: mankind-product-service
    ports:
      - "8080:8080"
    env_file:
      - product-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mankind-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: mankind-user-service
    ports:
      - "8081:8080"
    env_file:
      - user-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mankind-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: mankind-cart-service
    ports:
      - "8082:8080"
    env_file:
      - cart-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mankind-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  wishlist-service:
    build:
      context: .
      dockerfile: wishlist-service/Dockerfile
    container_name: mankind-wishlist-service
    ports:
      - "8083:8080"
    env_file:
      - wishlist-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mankind-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mankind-network:
    driver: bridge 