# Test Configuration - Load .env from parent directory
dotenv:
  path: ../.env

# Test-specific database configuration with fallbacks
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mankind_matrix_db}?connectTimeout=${DB_CONNECT_TIMEOUT:30000}&socketTimeout=${DB_SOCKET_TIMEOUT:30000}&useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=${DB_SERVER_TIMEZONE:UTC}&autoReconnect=${DB_AUTO_RECONNECT:true}&failOverReadOnly=${DB_FAIL_OVER_READ_ONLY:false}
    username: ${DB_USERNAME:matrix_user}
    password: ${DB_PASSWORD:matrix_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:20000}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:0}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:120000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:300000}
      leak-detection-threshold: ${DB_HIKARI_LEAK_DETECTION_THRESHOLD:30000}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/mankind
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/mankind/protocol/openid-connect/certs

# Keycloak configuration for tests
keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: mankind
  admin-user: ${ADMIN_USERNAME:admin}
  admin-password: ${ADMIN_PASSWORD:admin}
  admin-realm: master
  admin-client-id: admin-cli
  client-id: user-service
  client-secret: ""

# Server configuration
server:
  port: 8081 